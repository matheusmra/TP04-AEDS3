<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AEDs III | Simulador de Arquivo Binário</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-layout">
        <!-- Header -->
        <header class="app-header">
            <div class="logo">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-primary"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path></svg>
                <h1>AEDs III <span>CRUD Visualizer</span></h1>
            </div>

        </header>

        <main class="main-grid">
            <!-- Painel Esquerdo: Controles -->
            <aside class="control-panel panel">
                <div class="panel-header">
                    <h2>Operações</h2>
                    <div class="tabs">
                        <button class="tab-btn active" data-tab="create">Inserir</button>
                        <button class="tab-btn" data-tab="read">Buscar</button>
                    </div>
                </div>

                <div class="panel-body">
                    <!-- Form Inserir -->
                    <div class="tab-content active" id="tab-create">
                        <form id="form-curso" class="data-form">
                            <div class="form-group">
                                <label for="nome">Nome do Curso</label>
                                <input type="text" id="nome" name="nome" required placeholder="Ex: Introdução ao React">
                            </div>
                            <div class="form-row">
                                <div class="form-group">
                                    <label for="instrutor">Instrutor (Aluno)</label>
                                    <div class="input-with-icon">
                                        <svg class="input-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                                        <input type="text" id="instrutor" name="instrutor" required placeholder="Ex: Ana Lima">
                                    </div>
                                </div>
                                <div class="form-group">
                                    <label for="vagas">Vagas</label>
                                    <input type="number" id="vagas" name="vagas" required min="1" placeholder="Ex: 30">
                                </div>
                            </div>
                            <div class="form-group">
                                <label for="valor">Valor da Inscrição (R$)</label>
                                <div class="input-with-icon">
                                    <span class="input-icon">R$</span>
                                    <input type="number" id="valor" name="valor" required step="0.01" min="0" placeholder="0.00 (Gratuito)">
                                </div>
                            </div>
                            <button type="submit" class="btn btn-primary" id="btn-salvar">
                                Gravar no Arquivo
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
                            </button>
                        </form>
                    </div>

                    <!-- Form Buscar -->
                    <div class="tab-content" id="tab-read">
                        <form id="form-busca" class="data-form">
                            <div class="search-toggles">
                                <label class="toggle-label">
                                    <input type="radio" name="tipoBusca" value="id" checked>
                                    <span class="toggle-btn">Por ID</span>
                                </label>
                                <label class="toggle-label">
                                    <input type="radio" name="tipoBusca" value="nome">
                                    <span class="toggle-btn">Por Nome</span>
                                </label>
                            </div>
                            <div class="form-group">
                                <div class="search-input-wrapper">
                                    <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                                    <input type="text" id="termo-busca" placeholder="Digite para buscar..." required>
                                </div>
                            </div>
                            <button type="submit" class="btn btn-secondary">Buscar Registro</button>
                        </form>
                    </div>
                </div>
            </aside>

            <!-- Painel Direito: Visualização -->
            <section class="visualization-panel panel">
                <div class="panel-header flex-between">
                    <h2>Vetor de Bytes</h2>
                    <div class="stats-group">
                        <div class="stat-pill">
                            <span class="stat-label">Tamanho</span>
                            <span class="stat-value font-mono">0 B</span>
                        </div>
                        <div class="stat-pill">
                            <span class="stat-label">Registros</span>
                            <span class="stat-value font-mono">0</span>
                        </div>
                    </div>
                </div>

                <!-- Legenda Compacta -->
                <div class="legend-bar">
                    <div class="legend-item"><span class="swatch bg-header"></span> Cabeçalho</div>
                    <div class="legend-item"><span class="swatch bg-tombstone-active"></span> Lápide (Ativo)</div>
                    <div class="legend-item"><span class="swatch bg-tombstone-deleted"></span> Lápide (Excl.)</div>
                    <div class="legend-item"><span class="swatch bg-size"></span> Tamanho</div>
                    <div class="legend-item"><span class="swatch bg-id"></span> ID</div>
                    <div class="legend-item"><span class="swatch bg-name"></span> Curso</div>
                    <div class="legend-item"><span class="swatch bg-instructor"></span> Instrutor</div>
                    <div class="legend-item"><span class="swatch bg-capacity"></span> Vagas</div>
                    <div class="legend-item"><span class="swatch bg-price"></span> Valor</div>
                </div>

                <!-- View do Hex/Bytes -->
                <div class="hex-viewer">
                    <!-- Opcional: Coluna de offsets -->
                    <!-- <div class="hex-offsets font-mono"></div> -->
                    <div class="hex-grid" id="bytes-grid">
                        <div class="empty-state">
                            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" class="text-muted"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="9" y1="3" x2="9" y2="21"></line></svg>
                            <p>O arquivo está vazio.</p>
                            <span class="text-sm text-muted">Cadastre um curso para começar a simulação.</span>
                        </div>
                    </div>
                </div>

                <!-- Inspetor Inferior -->
                <div class="inspector-panel">
                    <div class="inspector-label">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>
                        Inspetor de Dados
                    </div>
                    <div class="inspector-value font-mono text-muted" id="inspector-content">
                        Aguardando interação...
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
